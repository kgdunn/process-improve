name: Feature request
description: Suggest a new method, capability, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case or limitation that motivates the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the package to do? An API sketch helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds you have looked at.
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: References
      description: Papers, textbook sections, or other implementations to draw on.
    validations:
      required: false
