name: Question
description: Ask how to use the package or interpret a result
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For "how do I ...?" questions, please also check the
        [documentation](https://kgdunn.github.io/process-improve/) and the
        companion textbook at [learnche.org/pid](https://learnche.org/pid).
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you tried?
      description: Relevant code, data shape, or results that give context.
      render: python
    validations:
      required: false
