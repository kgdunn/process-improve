name: Python package

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Add uv to PATH
      run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Create virtual environment
      run: uv venv

    - name: Install package with dependencies
      run: |
        source .venv/bin/activate
        uv pip install -e .

    - name: Install development dependencies
      run: |
        source .venv/bin/activate
        uv pip install pytest pytest-cov pytest-xdist ruff flake8

    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        # Check for errors and warnings
        ruff check process_improve tests

    - name: Lint with flake8
      run: |
        source .venv/bin/activate
        # Stop the build if there are Python syntax errors or undefined names
        flake8 process_improve tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 process_improve tests --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Run tests with pytest
      run: |
        source .venv/bin/activate
        pytest -v --cov=process_improve --cov-report=xml --cov-report=term-missing --cov-fail-under=70

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
